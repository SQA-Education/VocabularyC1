<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQA English · C1 Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SQA English — C1 Vocabulary Study Tool
     Single-file HTML. Built for GitHub Pages hosting.
     ------------------------------------------------------------
     HOW TO ADD / EDIT VOCABULARY:  see the SETS array in the
     <script> block far below. Each set is plain data — no code
     knowledge needed to add words.
     ------------------------------------------------------------
     IMAGES: image-based sets reference files in an  images/
     folder next to this HTML file. Until images exist, the tool
     shows the word itself as a clear text fallback, so every
     mode still works today.
     ------------------------------------------------------------
     GOOGLE FORM: see the FORM_CONFIG block. Paste the C1 Form's
     entry IDs there to turn on score reporting. Until then the
     tool runs fully; it just skips the report step.
     ============================================================ */

  :root {
    --bg: #f4f1ea;
    --ink: #1d2421;
    --paper: #fffdf7;
    --line: #d8d2c2;
    --moss: #2f5d4e;
    --moss-lt: #e3ede8;
    --clay: #bf5a36;
    --gold: #caa24a;
    --dim: #7a7568;
    --slate: #516b8b;
    --slate-lt: #e7ecf2;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(202,162,74,.10), transparent 45%),
      radial-gradient(circle at 0% 100%, rgba(47,93,78,.08), transparent 42%);
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--gold); color: var(--ink); }
  button { font-family: var(--font-body); cursor: pointer; border: none;
    transition: transform .12s ease, box-shadow .14s ease, background .15s ease, color .15s ease, border-color .15s ease; }
  button:active { transform: translateY(1px); }

  .wrap { max-width: 760px; margin: 0 auto; padding: 0 22px 64px; }

  header {
    border-bottom: 1.5px solid var(--line);
    padding: 22px 22px 16px;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    max-width: 760px; margin: 0 auto;
  }
  .logo {
    font-family: var(--font-display); font-size: 24px; font-weight: 600;
    letter-spacing: -.01em; background: none; color: var(--ink); padding: 0;
  }
  .crumb { color: var(--dim); font-size: 13px; font-weight: 500; }
  .pill {
    margin-left: auto; font-size: 12px; color: var(--moss);
    background: var(--moss-lt); padding: 5px 11px; border-radius: 20px; font-weight: 600;
  }

  h1.page {
    font-family: var(--font-display); font-size: 33px; font-weight: 600;
    line-height: 1.15; letter-spacing: -.02em; margin: 32px 0 8px;
  }
  p.lead { color: var(--dim); font-size: 15px; margin-bottom: 26px; max-width: 540px; }

  /* set list */
  .set-card {
    width: 100%; text-align: left; background: var(--paper);
    border: 1.5px solid var(--line); border-radius: 16px; padding: 18px 20px;
    display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 0 rgba(0,0,0,.02);
  }
  .set-card:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(29,36,33,.10); border-color: var(--moss); }
  .set-badge {
    width: 44px; height: 44px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff;
  }
  .set-name { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
  .set-meta { color: var(--dim); font-size: 13px; margin-top: 2px; }
  .set-arrow { margin-left: auto; font-size: 20px; font-weight: 600; color: var(--moss); }

  /* mode chooser */
  .mode-grid { display: grid; gap: 12px; }
  .mode-card {
    width: 100%; text-align: left; background: var(--paper);
    border: 1.5px solid var(--line); border-radius: 15px; padding: 18px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .mode-card:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(29,36,33,.10); }
  .mode-letter {
    width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 19px; font-weight: 700;
  }
  .mode-name { font-family: var(--font-display); font-size: 17px; font-weight: 600; }
  .mode-desc { color: var(--dim); font-size: 13px; margin-top: 2px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; }
  .topbar .label { font-size: 12.5px; color: var(--dim); font-weight: 600; }
  .exit { background: none; color: var(--dim); font-size: 13px; font-weight: 600; padding: 4px; }
  .exit:hover { color: var(--clay); }

  .bar { height: 6px; background: var(--line); border-radius: 6px; margin-top: 12px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--moss); border-radius: 6px; transition: width .35s ease; }

  /* flashcard */
  .flip-outer { perspective: 1200px; margin-top: 24px; cursor: pointer; }
  .flip { position: relative; width: 100%; height: 280px;
    transform-style: preserve-3d; transition: transform .55s cubic-bezier(.2,.7,.2,1); }
  .flip.on { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 0 32px; }
  .face.front { background: var(--paper); border: 1.5px solid var(--line); box-shadow: 0 8px 26px rgba(29,36,33,.08); }
  .face.back { background: var(--moss); transform: rotateY(180deg); box-shadow: 0 8px 26px rgba(29,36,33,.14); }
  .kicker { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; }
  .term-lg { font-family: var(--font-display); font-size: 38px; font-weight: 600; margin-top: 10px; text-align: center; }
  .def-lg { font-family: var(--font-display); font-size: 23px; font-weight: 500; margin-top: 12px;
    color: #fff; text-align: center; line-height: 1.4; }
  .def-num { font-family: var(--font-display); font-weight: 700; font-size: 96px;
    color: #fff; text-align: center; line-height: 1; margin-top: 8px; }
  .card-img { max-width: 200px; max-height: 150px; margin-top: 12px; border-radius: 12px; }
  /* inline SVG illustrations */
  .art { margin-top: 12px; }
  .art svg { width: 100% !important; height: 100% !important; display: block; max-width: 100%; max-height: 100%; }
  .face.back .art { background: #fff; border-radius: 12px; padding: 6px; }
  /* color swatches (Colors set) */
  .swatch { display: inline-block; border-radius: 12px; margin-top: 12px;
    box-shadow: 0 2px 8px rgba(29,36,33,.15); }
  .tile.def .art, .tile.def .swatch { margin-top: 0; }
  .opt .art, .opt .swatch { margin-top: 0; vertical-align: middle; }

  .row { display: flex; gap: 12px; margin-top: 22px; }
  .btn { flex: 1; padding: 15px; border-radius: 13px; font-size: 15px; font-weight: 600; }
  .btn-know { background: var(--moss); color: #fff; }
  .btn-learn { background: var(--paper); border: 1.5px solid var(--clay); color: var(--clay); }
  .btn-dark { background: var(--ink); color: #fff; width: 100%; padding: 15px; border-radius: 13px;
    font-size: 15px; font-weight: 600; margin-top: 16px; }

  /* quiz */
  .qcard { margin-top: 24px; background: var(--paper); border: 1.5px solid var(--line);
    border-radius: 18px; padding: 24px 22px; }
  .qword { font-family: var(--font-display); font-size: 34px; font-weight: 600; margin: 8px 0 20px; }
  .opts { display: grid; gap: 10px; }
  .opt { text-align: left; padding: 13px 15px; border-radius: 11px; background: var(--bg);
    border: 1.5px solid var(--line); color: var(--ink); font-size: 14.5px; font-weight: 500; line-height: 1.4; }
  .opt.correct { background: var(--moss-lt); border-color: var(--moss); color: var(--moss); }
  .opt.wrong { background: #f6e3dc; border-color: var(--clay); color: var(--clay); }
  .opt .tick { float: right; }
  .speak { margin-top: 16px; background: var(--moss-lt); color: var(--moss); border: 1.5px solid var(--moss);
    padding: 9px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .speak:hover { background: var(--moss); color: #fff; }
  .speak:active { transform: scale(.97); }
  .listen-big { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    margin: 16px auto 2px; background: var(--slate); color: #fff; border: none; border-radius: 18px;
    width: 148px; height: 116px; font-size: 42px; line-height: 1; cursor: pointer;
    box-shadow: 0 8px 20px rgba(81,107,139,.25); }
  .listen-big span { font-size: 13px; font-weight: 600; letter-spacing: .02em; }
  .listen-big:hover { filter: brightness(1.07); }
  .listen-big:active { transform: scale(.97); }

  /* matching */
  .match-grid { display: flex; gap: 12px; margin-top: 18px; }
  .match-col { display: grid; gap: 9px; flex: 1; align-content: start; }
  .tile { padding: 13px 12px; border-radius: 11px; border: 1.5px solid var(--line);
    background: var(--paper); color: var(--ink); line-height: 1.35; }
  .tile.term { font-family: var(--font-display); font-size: 16px; font-weight: 600; text-align: center; }
  .tile.def { font-size: 12.5px; font-weight: 500; text-align: left; min-height: 56px; }
  .tile.sel { background: var(--moss); color: #fff; border-color: var(--moss); }
  .tile.matched { background: var(--moss-lt); color: rgba(47,93,78,.45); opacity: .55; cursor: default; }
  .tile.bad { background: #f6e3dc; color: var(--clay); border-color: var(--clay); }

  /* result */
  .result { max-width: 460px; margin: 56px auto 0; text-align: center; }
  .result .check { width: 62px; height: 62px; border-radius: 50%; background: var(--moss);
    margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff; }
  .result h2 { font-family: var(--font-display); font-size: 27px; font-weight: 600; margin-bottom: 10px; }
  .result p { color: var(--dim); font-size: 15px; margin-bottom: 4px; }

  .name-input {
    width: 100%; padding: 13px 15px; border-radius: 11px; border: 1.5px solid var(--line);
    font-size: 15px; font-family: var(--font-body); background: var(--paper); color: var(--ink); margin-top: 6px;
  }
  .name-input:focus { outline: 2px solid var(--moss); outline-offset: 1px; }

  .note {
    margin-top: 28px; padding: 13px 15px; background: var(--moss-lt);
    border: 1px solid var(--line); border-radius: 12px; font-size: 12.5px;
    color: var(--moss); line-height: 1.5;
  }
  .reset { margin-top: 18px; background: none; color: var(--dim); font-size: 12.5px;
    text-decoration: underline; text-underline-offset: 3px; padding: 2px; }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .rise { animation: rise .4s ease both; }

  @media (max-width: 480px) {
    h1.page { font-size: 27px; }
    .term-lg { font-size: 32px; }
    .qword { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <button class="logo" onclick="go({name:'home'})">SQA English</button>
  <span class="crumb">C1 · Vocabulary Practice</span>
  <span class="pill" id="head-pill">Level C1</span>
</header>

<div class="wrap" id="app"></div>

<script>
/* ================================================================
   FORM_CONFIG — Google Form score reporting
   ----------------------------------------------------------------
   To turn on teacher reporting:
   1. Create a NEW C1 Google Form with 3 short-answer questions:
        Student name | Set | Score
   2. Open the form, click the three-dot menu > "Get pre-filled link"
   3. Fill dummy answers, copy the link, read the entry.XXXX IDs
   4. Paste the form ID and the three entry IDs below, set enabled:true
   Until enabled is true, the tool runs fully and simply skips
   the reporting step.
   ================================================================ */
const FORM_CONFIG = {
  enabled: false,                          // <-- set to true after pasting the C1 form ID below
  formId: "PASTE_C1_FORM_ID_HERE",         // <-- the C1 Google Form's /d/e/XXXX id
  entryName: "entry.1100310467",           // same three entry IDs used across all levels
  entrySet: "entry.1988772705",
  entryScore: "entry.1275573724",
};

/* ================================================================
   SETS — the C1 vocabulary. Add or edit sets here.
   ----------------------------------------------------------------
   Each set:
     id    : short unique string (no spaces)
     name  : shown to students
     type  : "text"  -> definition side is text
             "image" -> definition side is a picture
     cards : list of { term, def, img }
        term : the vocabulary word/phrase
        def  : the text definition  (used by "text" sets, and as
               the fallback label for "image" sets with no picture)
        img  : image filename in the images/ folder (image sets).
               Leave "" until the picture exists — the tool will
               show the def text instead so every mode still works.
   ================================================================ */
const SVG_ART = {};

const SETS = [
  { id: "presenting", name: "Presenting & communicating", type: "text",
    cards: [
      {"term": "improve", "def": "to make something better", "ex": "We must constantly improve our service to keep customers happy."},
      {"term": "handle", "def": "deal with, manage", "ex": "A good manager can handle several problems at the same time."},
      {"term": "target group/audience", "def": "a particular group of people who you want to reach", "ex": "We defined our target group before designing the campaign."},
      {"term": "to voice", "def": "to express or communicate an idea or an opinion", "ex": "Employees should feel free to voice their concerns at meetings."},
      {"term": "to address", "def": "to speak to; to direct one's attention to; to deal with a specific issue", "ex": "The report completely fails to address the main problem."},
      {"term": "notice", "def": "to observe; to become aware of something", "ex": "Did you notice the change in the meeting schedule?"},
      {"term": "to present", "def": "to show or describe someone or something", "ex": "She was asked to present the results to the board."},
      {"term": "collect", "def": "to gather together information or other things", "ex": "We collect feedback from customers every single month."},
      {"term": "boost", "def": "to improve or increase something", "ex": "The new advertising campaign helped boost our sales."},
      {"term": "set apart", "def": "to make (someone or something) different", "ex": "Excellent service can set apart a small business from its rivals."},
      {"term": "showcase", "def": "to present or display, exhibit", "ex": "The fair is a chance to showcase new products to buyers."},
      {"term": "to draft", "def": "prepare the first version of (a text)", "ex": "She offered to draft the first version of the proposal."},
      {"term": "increase", "def": "to make or become larger; to add to", "ex": "The company plans to increase wages early next year."},
      {"term": "decrease", "def": "to become or make less or smaller", "ex": "Sales tend to decrease during the cold winter months."},
      {"term": "reward", "def": "to give a person something he or she has earned", "ex": "The firm decided to reward its best employees with a bonus."},
    ],
  },
  { id: "education", name: "Education terms", type: "text",
    cards: [
      {"term": "ESL", "def": "English as a Second Language programs for non-native speakers.", "ex": "She teaches an ESL class for adult immigrants in the evenings."},
      {"term": "GED", "def": "Set of tests certifying high school-level academic skills upon passing.", "ex": "He earned his GED a few years after leaving school early."},
      {"term": "TOEFL", "def": "Standardized test assessing English language proficiency for non-native speakers.", "ex": "International students often take the TOEFL before applying to college."},
      {"term": "3rd grade", "def": "Third year of elementary school, typically for 8-9-year-old children.", "ex": "My daughter just started 3rd grade this September."},
      {"term": "K-12", "def": "Educational system covering kindergarten through 12th grade in many countries.", "ex": "The new policy affects the entire K-12 system."},
      {"term": "STEM", "def": "Science, Technology, Engineering, and Mathematics", "ex": "The school added several new STEM courses this year."},
      {"term": "ELL", "def": "English Language Learner", "ex": "The teacher gives the ELL students extra reading support."},
      {"term": "SPED", "def": "Special Education", "ex": "She works as a SPED teacher for children with special needs."},
      {"term": "GPA", "def": "Grade Point Average", "ex": "A high GPA can help you win a scholarship."},
      {"term": "MAP", "def": "Measures of Academic Progress", "ex": "Students take the MAP test twice a year to track their growth."},
    ],
  },
  { id: "medical", name: "Medical & emergency", type: "text",
    cards: [
      {"term": "Unconscious", "def": "Not awake or aware of one's surroundings.", "ex": "The patient was unconscious when the ambulance arrived."},
      {"term": "Ambulance", "def": "A vehicle equipped to transport sick or injured people to hospital.", "ex": "Someone called an ambulance right after the accident."},
      {"term": "Pulse", "def": "The regular beating of arteries as blood is pumped through them.", "ex": "The nurse checked the patient's pulse and breathing."},
      {"term": "CPR", "def": "Cardiopulmonary resuscitation; an emergency procedure to maintain blood flow when the heart stops.", "ex": "Every member of staff is trained to perform CPR."},
      {"term": "Circulate", "def": "To move or cause to move in a circuit or cycle.", "ex": "Blood must circulate freely through the whole body."},
      {"term": "Calm", "def": "Peaceful, tranquil, or free from agitation.", "ex": "Try to stay calm while you wait for help to arrive."},
      {"term": "Speakerphone", "def": "A phone feature allowing hands-free use and for others to hear the conversation.", "ex": "She put the call on speakerphone so everyone could hear."},
      {"term": "Paramedic", "def": "A person trained to provide emergency medical treatment at the scene of an accident.", "ex": "The paramedic treated the injured driver at the scene."},
      {"term": "Heel of one's hand", "def": "The firm part of the palm nearest to the wrist.", "ex": "Press down firmly with the heel of one's hand during compressions."},
      {"term": "Compression", "def": "The act of pressing something into a smaller space or applying pressure.", "ex": "Steady chest compression helps keep blood moving during cardiac arrest."},
    ],
  },
  { id: "work-life", name: "Work & lifestyle", type: "text",
    cards: [
      {"term": "Complain", "def": "to express unhappiness or concern", "ex": "Customers often complain when their deliveries are late."},
      {"term": "Exceed", "def": "to be more than", "ex": "Our profits this year exceed all of our expectations."},
      {"term": "Burnout", "def": "the loss of strength or motivation due to stress", "ex": "Long hours with no rest can quickly lead to burnout."},
      {"term": "Leisure", "def": "relating to free time", "ex": "He spends his leisure time hiking and reading."},
      {"term": "Hook up", "def": "to connect", "ex": "Can you help me hook up the printer to the laptop?"},
      {"term": "Supplement", "def": "to add something extra", "ex": "She works evenings to supplement her main income."},
      {"term": "Buck", "def": "a dollar (slang)", "ex": "Can you lend me a buck for the parking meter?"},
      {"term": "Moonlight", "def": "to work a second job", "ex": "He began to moonlight as a driver to pay off his debts."},
    ],
  },
  { id: "business", name: "Business & startups", type: "text",
    cards: [
      {"term": "pitch", "def": "presentation to sell an idea or product", "ex": "She gave a confident pitch to a room full of investors."},
      {"term": "investment", "def": "money put into a business to make more money", "ex": "The company made a large investment in new equipment."},
      {"term": "revenue", "def": "total money earned by a business", "ex": "Monthly revenue grew steadily after the product launch."},
      {"term": "profit", "def": "money left after paying all expenses", "ex": "The shop finally made a profit in its second year."},
      {"term": "market research", "def": "study of what customers want and need", "ex": "They did careful market research before opening the store."},
      {"term": "scalability", "def": "ability of a business to grow larger", "ex": "Investors were impressed by the product's scalability."},
      {"term": "succeed", "def": "Achieve a goal or desired result", "ex": "Very few startups succeed without a clear plan."},
      {"term": "borrow money", "def": "get funds with the promise to repay", "ex": "Many founders borrow money from a bank to get started."},
      {"term": "entrepreneur", "def": "a person who starts and runs a business", "ex": "The young entrepreneur opened three shops in one year."},
      {"term": "startup", "def": "a new, small company with growth potential", "ex": "Her tech startup hired ten people in its first month."},
      {"term": "run a company", "def": "manage and control a business", "ex": "It takes strong nerves to run a company during a crisis."},
    ],
  },
  { id: "time-stress", name: "Time management & stress", type: "text",
    cards: [
      {"term": "cope with", "def": "to deal with a difficult situation", "ex": "She slowly learned to cope with the pressure of deadlines."},
      {"term": "deadline", "def": "the time by which something must be finished", "ex": "We have to meet the deadline by Friday afternoon."},
      {"term": "time management", "def": "the ability to use time well", "ex": "Good time management is essential during exam season."},
      {"term": "burnout", "def": "extreme tiredness from too much stress", "ex": "Taking regular breaks helps prevent burnout."},
      {"term": "task", "def": "a piece of work", "ex": "He finished the difficult task well ahead of schedule."},
      {"term": "efficient", "def": "working well without wasting time", "ex": "A clear system makes the whole team more efficient."},
      {"term": "set boundaries", "def": "to create clear limits", "ex": "It is healthy to set boundaries between work and home."},
      {"term": "take a break", "def": "to stop working for a short time", "ex": "Let's take a break and meet again in ten minutes."},
      {"term": "get through", "def": "to complete or survive something difficult", "ex": "We need to get through all this paperwork today."},
      {"term": "stressful", "def": "causing a lot of worry or pressure", "ex": "Moving to a new country can be very stressful."},
      {"term": "make time for", "def": "to create time in your schedule for something", "ex": "Try to make time for some exercise every week."},
      {"term": "boost", "def": "to improve or increase", "ex": "A short walk can boost your energy in the afternoon."},
      {"term": "clear your head", "def": "to relax and think more clearly", "ex": "Sometimes you just need to clear your head before deciding."},
      {"term": "cut down on", "def": "to reduce", "ex": "The doctor told him to cut down on salt and sugar."},
      {"term": "workload", "def": "the amount of work someone has", "ex": "Her workload doubled after two colleagues left."},
    ],
  },
  { id: "holidays", name: "U.S. holidays", type: "text",
    cards: [
      {"term": "New Year's Day", "def": "The first day of the year. People celebrate with parties, fireworks, and making resolutions.", "ex": "Many people make resolutions on New Year's Day."},
      {"term": "Martin Luther King Jr. Day", "def": "Honors the famous civil rights leader. People remember his work for racial equality and justice.", "ex": "Martin Luther King Jr. Day honors a great civil rights leader."},
      {"term": "Presidents' Day", "def": "Celebrates past U.S. presidents, especially Washington and Lincoln. Many stores have sales on this day.", "ex": "Many stores hold big sales on Presidents' Day."},

   Each word counts as "learned" once answered correctly LEARN_TARGET times
   across the study modes. Lower it to 2 to match the other levels, or raise
   it for a stricter bar. The weekly plan pairs new sets with review of the
   sets learned earlier — spaced practice is what moves words into memory. */
const LEARN_TARGET = 5;
const TOTAL_WORDS = SETS.reduce((n,s)=>n+s.cards.length,0);

function shuffle(a){const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---- audio: speak a word using the browser's built-in voice (no files, works offline) ---- */
function canSpeak(){ return typeof window!=="undefined" && "speechSynthesis" in window; }
function speak(text){
  try{
    if(!canSpeak()) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text));
    u.lang="en-US"; u.rate=.95;
    speechSynthesis.speak(u);
  }catch(e){ /* audio is best-effort; never blocks the student */ }
}

/* ---- speaking practice: recognise the student's voice (Chrome/Safari, needs mic + internet) ---- */
function canRecognize(){ return typeof window!=="undefined" && !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function listenOnce(onResult,onError){
  try{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR(); r.lang="en-US"; r.interimResults=false; r.maxAlternatives=4;
    let got=false;
    r.onresult=(e)=>{ got=true; const alts=[]; const R=e.results[0]; for(let i=0;i<R.length;i++) alts.push(R[i].transcript); onResult(alts); };
    r.onerror=(e)=>{ onError&&onError(e.error||"error"); };
    r.onend=()=>{ if(!got) onError&&onError("no-speech"); };
    r.start();
    return r;
  }catch(e){ onError&&onError("unsupported"); return null; }
}
function normalizeSpeech(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }
function speechMatches(term,alts){
  const t=normalizeSpeech(term); const tT=t.split(" ").filter(Boolean);
  return alts.some(a=>{
    const n=normalizeSpeech(a); if(!n) return false;
    if(n===t) return true;
    const nT=n.split(" ");
    if(tT.length===1) return nT.includes(t);               // single word: must be said
    const hit=tT.filter(x=>nT.includes(x)).length;         // phrase: most words present
    return hit>=Math.ceil(tT.length*0.6);
  });
}

/* ---- progress: stored per set in the browser ---- */
function progKey(setId){return "sqa_vocab_c1_"+setId;}
function loadProg(setId){
  try { return JSON.parse(localStorage.getItem(progKey(setId))) || {}; }
  catch(e){ return {}; }
}
function saveProg(setId,p){
  try { localStorage.setItem(progKey(setId), JSON.stringify(p)); }
  catch(e){ /* storage unavailable — tool still works for the session */ }
}
function bumpProg(setId,term,correct){
  const p=loadProg(setId);
  const c=p[term]||{seen:0,correct:0};
  p[term]={seen:c.seen+1,correct:c.correct+(correct?1:0)};
  saveProg(setId,p);
}
function learnedCount(set){
  const p=loadProg(set.id);
  return set.cards.filter(c=>p[c.term]&&p[c.term].correct>=LEARN_TARGET).length;
}

function reportScore(setName,scoreText){
  if(!FORM_CONFIG.enabled) return;
  try{

    const u="https://docs.google.com/forms/d/e/"+FORM_CONFIG.formId+"/formResponse";
    const f=new FormData();

}

/* ---- the meaning side renderer ----
   Handles four cases, in priority order:
     1. card.img === "svg"  -> inline illustration from SVG_ART
     2. card.swatch         -> a solid color square (Colors set)
     3. card.img (filename) -> external image from images/ folder
     4. otherwise           -> the definition text
   size: "lg" (flashcard back), "md" (quiz option), "sm" (match tile)
*/
function meaningHTML(card,size){
  const dim = size==="lg" ? 150 : size==="md" ? 78 : 56;
  // 1. embedded SVG illustration — by explicit 'art' key, then term, then def
  if(card.img==="svg"){
    const art = SVG_ART[card.art] || SVG_ART[card.term] || SVG_ART[card.def];
    if(art){
      return `<span class="art" style="width:${dim}px;height:${dim}px;display:inline-block">${art}</span>`;
    }
  }
  // 2. color swatch (drawn, no file needed)
  if(card.swatch){
    const stroke = card.swatch.toLowerCase()==="#fbfaf6" ? "var(--line)" : "transparent";
    return `<span class="swatch" style="width:${dim}px;height:${dim}px;background:${esc(card.swatch)};border:2px solid ${stroke}"></span>`;
  }
  // 3. external image file
  if(card.img){
    return `<img class="card-img" src="images/${esc(card.img)}" alt="${esc(card.def)}" />`;
  }
  // 4. plain text definition — render short numbers extra-large
  const isShortNumber = /^\d{1,4}$/.test(String(card.def).trim());
  if(size==="lg" && isShortNumber){
    return `<span class="def-num">${esc(card.def)}</span>`;
  }
  return `<span class="${size==='lg'?'def-lg':''}">${esc(card.def)}</span>`;
}
/* does this set show a visual (illustration or swatch) on the meaning side? */
function setIsVisual(set){
  return set.type==="image" || set.type==="color";
}

/* renders the MEANING side as a quiz QUESTION (cream background, dark ink).
   Used by the quiz, which asks meaning → word for faster classroom pacing. */
function questionHTML(card){
  // 1. embedded SVG illustration
  if(card.img==="svg"){
    const art = SVG_ART[card.art] || SVG_ART[card.term] || SVG_ART[card.def];
    if(art) return `<span class="art" style="width:150px;height:150px;display:inline-block;margin-top:8px">${art}</span>`;
  }
  // 2. color swatch
  if(card.swatch){
    const stroke = card.swatch.toLowerCase()==="#fbfaf6" ? "var(--line)" : "transparent";
    return `<span class="swatch" style="width:150px;height:150px;background:${esc(card.swatch)};border:2px solid ${stroke};margin-top:8px"></span>`;
  }
  // 3. external image file
  if(card.img){
    return `<img class="card-img" src="images/${esc(card.img)}" alt="${esc(card.def)}" />`;
  }
  // 4. short numeric definition rendered extra-large (Numbers set)
  const isShortNumber = /^\d{1,4}$/.test(String(card.def).trim());
  if(isShortNumber){
    return `<div style="font-family:var(--font-display);font-size:84px;font-weight:700;line-height:1;color:var(--ink);text-align:center;margin-top:8px">${esc(card.def)}</div>`;
  }
  // 5. plain text definition
  return `<div style="font-family:var(--font-display);font-size:22px;font-weight:500;line-height:1.4;color:var(--ink);text-align:center;margin:10px 4px 0">${esc(card.def)}</div>`;
}

/* ---- FILL THE BLANK (cloze): sentence with the word removed -> type it ---- */
function clozeText(ex,term){
  const e=clozeTarget(term).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return ex.replace(new RegExp(e,'i'),'\u2003______\u2003');
}
function renderCloze(){
  const set=SETS.find(s=>s.id===STATE.setId);
  const order=shuffle(set.cards.filter(c=>c.ex));
  if(order.length===0){

    return;
  }
  let i=0,score=0,answered=false;
  function draw(){
    const card=order[i];
    app.innerHTML=`
      <div class="topbar">
        <span class="label">Sentence ${i+1} of ${order.length}</span>
        <button class="exit" onclick='go({name:"modes",setId:"${set.id}"})'>\u2715 Exit</button>
      </div>
      <div class="bar"><i style="width:${(i/order.length)*100}%;background:#3f7068"></i></div>
      <div class="qcard rise" style="text-align:center">
        <span class="kicker" style="color:var(--dim)">Type the missing word</span>
        <div style="font-family:var(--font-display);font-size:21px;font-weight:500;line-height:1.55;color:var(--ink);margin:12px 4px 0">${esc(clozeText(card.ex,card.term)).replace(/______/g,'<span style="color:#3f7068;font-weight:700">______</span>')}</div>
        <input id="cloze-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"

      else if(close){ fb.style.color="#9a7b18"; fb.innerHTML=`\u2713 Almost \u2014 spelling: <b>${esc(clozeTarget(card.term))}</b>`; }
      else { fb.style.color="var(--clay)"; fb.innerHTML=`\u2715 The word is <b>${esc(clozeTarget(card.term))}</b>`; }
      const last=i+1>=order.length;
      $("next-slot").innerHTML=`<button class="btn-dark rise" id="next-btn">${last?"See results":"Next sentence"}</button>`;

      };

    }
  }

}

/* ---- term forms: accept "to X"/"X", either side of a slash, drop (notes) ---- */
function baseTerm(term){ return String(term).replace(/\s*\([^)]*\)\s*/g," ").trim(); }
function termForms(term){
  const full=String(term).trim(), base=baseTerm(term);
  const parts=base.split("/").map(s=>s.trim()).filter(Boolean);
  const forms=new Set([full, base, ...parts]);
  [base, ...parts].forEach(p=>{ if(/^to\s+/i.test(p)) forms.add(p.replace(/^to\s+/i,"").trim()); });
  return [...forms].filter(Boolean);
}
function clozeTarget(term){
  const base=baseTerm(term);
  let t=base.split("/")[0].trim().replace(/^to\s+/i,"").trim();
  return t||base;
}

/* ---- RECALL: read the meaning, type the word (productive recall for advanced learners) ---- */
function lev(a,b){
  a=a||"";b=b||"";const m=a.length,n=b.length;
  const d=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++)d[i][0]=i;
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  }
  return d[m][n];
}

    $("check-btn").onclick=check;
    function check(){

/* ---- MATCHING ---- */
function renderMatch(){
  const set=SETS.find(s=>s.id===STATE.setId);
  const pool=shuffle(set.cards).slice(0,Math.min(6,set.cards.length));
  const terms=shuffle(pool),defs=shuffle(pool);
  let selTerm=null,selDef=null,matched={},lock=false,ticks=0;
  const timer=setInterval(()=>{ticks++;const t=$("match-time");if(t)t.textContent=ticks+"s";},1000);

  function draw(){
    let tHtml="",dHtml="";
    terms.forEach((c,idx)=>{
      const cls="tile term"+(matched[c.term]?" matched":"")+(selTerm===c.term?" sel":"");
      tHtml+=`<button class="${cls}" id="t-${idx}" ${matched[c.term]?"disabled":""}>${esc(c.term)}</button>`;
    });
    defs.forEach((c,idx)=>{
      const cls="tile def"+(matched[c.term]?" matched":"")+(selDef===c.term?" sel":"");
      const inner=setIsVisual(set) ? meaningHTML(c,"sm") : esc(c.def);
      dHtml+=`<button class="${cls}" id="d-${idx}" ${matched[c.term]?"disabled":""}>${inner}</button>`;
    });
    app.innerHTML=`
      <div class="topbar">
        <span class="label">${Object.keys(matched).length} of ${pool.length} matched · <span id="match-time">${ticks}s</span></span>
        <button class="exit" onclick='exitMatch("${set.id}")'>✕ Exit</button>
      </div>
      <p class="lead" style="margin:14px 0 4px;font-size:13.5px">Tap a word, then tap its meaning. Wrong pairs flash and reset.</p>
      <div class="match-grid">
        <div class="match-col">${tHtml}</div>
        <div class="match-col">${dHtml}</div>
      </div>`;
    terms.forEach((c,idx)=>{ const el=$("t-"+idx); if(el&&!matched[c.term]) el.onclick=()=>pick("term",c.term); });
    defs.forEach((c,idx)=>{ const el=$("d-"+idx); if(el&&!matched[c.term]) el.onclick=()=>pick("def",c.term); });
  }
  function pick(kind,term){
    if(lock)return;
    if(kind==="term")selTerm=term; else selDef=term;
    draw();
    if(selTerm&&selDef){
      if(selTerm===selDef){
        matched[selTerm]=true;
        bumpProg(set.id,selTerm,true);
        selTerm=selDef=null;
        if(Object.keys(matched).length===pool.length){
          clearInterval(timer);
          showResult({
            title:"All matched",
            lines:[`Finished in ${ticks} second${ticks===1?"":"s"}`,`${pool.length} pairs`],
            setId:set.id,
          });
          return;
        }
        draw();
      } else {
        lock=true;
        const ti=terms.findIndex(c=>c.term===selTerm);
        const di=defs.findIndex(c=>c.term===selDef);
        if($("t-"+ti))$("t-"+ti).classList.add("bad");
        if($("d-"+di))$("d-"+di).classList.add("bad");
        setTimeout(()=>{selTerm=selDef=null;lock=false;draw();},560);
      }
    }
  }
  window.exitMatch=(id)=>{clearInterval(timer);go({name:"modes",setId:id});};
  draw();
}

/* ---- RESULT ---- */
function showResult(o){
  // Report once, when the student leaves the result screen, so the name they
  // type below is included. Returning students (name already known) report
  // immediately so a completed score is never lost.
  let sent=false;
  function submitOnce(){
    if(sent || !o.report) return;
    sent=true;
    reportScore(o.report.setName,o.report.scoreText);
  }
  let nameField="";
  if(FORM_CONFIG.enabled&&o.report){
    nameField=`<div style="margin:18px auto 0;max-width:300px;text-align:left">
      <label style="font-size:12.5px;color:var(--dim);font-weight:600">Your name (so your teacher sees this)</label>
      <input class="name-input" id="stu-name" placeholder="Type your name"
        value="${esc(window.__studentName||"")}" />
    </div>`;
  }
  let lines=o.lines.map(l=>`<p>${esc(l)}</p>`).join("");
  app.innerHTML=`<div class="result rise">
    <div class="check">✓</div>
    <h2>${esc(o.title)}</h2>
    ${lines}
    ${nameField}
    <button class="btn-dark" id="res-modes" style="max-width:300px;margin:24px auto 0">Back to study modes</button>
    <div><button class="reset" id="res-home">Choose a different set</button></div>
  </div>`;
  if(FORM_CONFIG.enabled&&o.report){
    const ni=$("stu-name");
    if(ni) ni.oninput=()=>{
      window.__studentName=ni.value;
      try{ localStorage.setItem("sqa_student_name",ni.value); }catch(e){}
    };
    if((window.__studentName||"").trim()) submitOnce();
  }
  $("res-modes").onclick=()=>{ submitOnce(); go({name:"modes",setId:o.setId}); };
  $("res-home").onclick=()=>{ submitOnce(); go({name:"home"}); };
}

function setById(id){ return SETS.find(s=>s.id===id); }
function getWeek(){ try{ return Math.min(8,Math.max(1, parseInt(localStorage.getItem("sqa_c1_week")||"1",10)||1)); }catch(e){ return 1; } }
function setWeek(n){ try{ localStorage.setItem("sqa_c1_week",String(n)); }catch(e){} go({name:"plan"}); }
function planTotals(ids){ let total=0,learned=0; ids.forEach(id=>{const s=setById(id); if(s){ total+=s.cards.length; learned+=learnedCount(s); }}); return {total,learned}; }
function meterHTML(learned,total,color){
  const pct=total?Math.round(learned/total*100):0;
  return `<div class="bar" style="margin-top:8px"><i style="width:${pct}%;background:${color}"></i></div>
    <div style="font-size:12px;color:var(--dim);margin-top:5px">${learned} of ${total} words learned \u00b7 ${pct}%</div>`;
}
function renderPlan(){
  $("head-pill").textContent="8-Week Plan";
  const wk=getWeek(), plan=C1_WEEKS[wk-1];
  const grand=planTotals(SETS.map(s=>s.id)), goal=planTotals(plan.learn);

  let sel="";
  C1_WEEKS.forEach(w=>{
    const on=w.wk===wk;
    sel+=`<button onclick='setWeek(${w.wk})' style="flex:1;min-width:34px;padding:9px 0;border-radius:10px;border:1.5px solid ${on?'var(--moss)':'var(--line)'};background:${on?'var(--moss)':'var(--paper)'};color:${on?'#fff':'var(--ink)'};font-weight:700;font-family:var(--font-display);font-size:15px">${w.wk}</button>`;
  });

  let newCards="";
  plan.learn.forEach(id=>{
    const s=setById(id); if(!s) return;
    const t=planTotals([id]);
    newCards+=`<div class="set-card" style="display:block;cursor:default">
      <div style="display:flex;align-items:baseline;gap:10px">
        <span class="set-name">${esc(s.name)}</span>
        <span class="set-meta" style="margin-left:auto">${s.cards.length} words</span>
      </div>
      ${meterHTML(t.learned,t.total,"var(--moss)")}
      <button class="btn-dark" style="margin-top:12px;padding:11px" onclick='go({name:"modes",setId:"${s.id}"})'>Study this set \u2192</button>
    </div>`;
  });

  let rev="";
  if(plan.review.length){
    plan.review.forEach(id=>{
      const s=setById(id); if(!s) return;
      const t=planTotals([id]);
      rev+=`<button class="mode-card" style="padding:13px 16px" onclick='go({name:"modes",setId:"${s.id}"})'>
        <span><span class="mode-name" style="font-size:15px">${esc(s.name)}</span>
        <span class="mode-desc">${t.learned}/${t.total} learned \u00b7 tap to review</span></span>
        <span class="set-arrow" style="margin-left:auto;color:var(--slate)">\u21bb</span>
      </button>`;
    });
  } else {
    rev=`<p class="lead" style="font-size:13.5px;margin:0">No review yet \u2014 this is your first week. Enjoy the fresh start.</p>`;
  }

  let road="";
  C1_WEEKS.forEach(w=>{
    const names=w.learn.map(id=>{const s=setById(id);return s?s.name:id;}).join(", ");
    const cnt=planTotals(w.learn).total, on=w.wk===wk;
    road+=`<div style="display:flex;gap:12px;align-items:flex-start;padding:11px 8px;border-bottom:1px solid var(--line);${on?'background:var(--moss-lt);border-radius:8px':''}">
      <span style="flex:0 0 50px;font-family:var(--font-display);font-weight:700;color:${on?'var(--moss)':'var(--dim)'}">Wk ${w.wk}</span>
      <span style="flex:1;font-size:13.5px;line-height:1.45"><b>${esc(names)}</b><span style="color:var(--dim)"> \u00b7 ${cnt} new${w.review.length?` \u00b7 review ${w.review.length} earlier set${w.review.length>1?'s':''}`:''}</span></span>
    </div>`;
  });

  app.innerHTML=`
    <div class="topbar rise">
      <span class="label">8-week study plan</span>
      <button class="exit" onclick='go({name:"home"})'>\u2190 All sets</button>
    </div>
    <h1 class="page rise" style="margin-bottom:6px">Your 8-week goal</h1>
    <p class="lead rise">Learn all ${grand.total} words in 8 weeks \u2014 about 18 a week. Each week adds a little new vocabulary and reviews what came before, which is how the words stick.</p>

    <div class="rise" style="background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:18px 20px">
      <div style="font-family:var(--font-display);font-size:16px;font-weight:600">Overall progress</div>
      ${meterHTML(grand.learned,grand.total,"var(--moss)")}
    </div>

    <h2 class="rise" style="font-family:var(--font-display);font-size:18px;font-weight:600;margin:26px 0 10px">Pick your week</h2>
    <div class="rise" style="display:flex;gap:6px">${sel}</div>

    <h2 class="rise" style="font-family:var(--font-display);font-size:18px;font-weight:600;margin:24px 0 4px">Week ${wk} \u00b7 new vocabulary</h2>
    <p class="lead rise" style="margin-bottom:12px;font-size:13.5px">This week's goal: ${goal.total} new words \u2014 ${goal.learned} learned so far.</p>
    <div class="rise">${newCards}</div>
    ${meterHTML(goal.learned,goal.total,"var(--clay)")}

    <h2 class="rise" style="font-family:var(--font-display);font-size:18px;font-weight:600;margin:26px 0 10px">Week ${wk} \u00b7 review</h2>
    <div class="rise mode-grid">${rev}</div>

    <h2 class="rise" style="font-family:var(--font-display);font-size:18px;font-weight:600;margin:28px 0 6px">The full roadmap</h2>
    <div class="rise" style="background:var(--paper);border:1.5px solid var(--line);border-radius:16px;padding:6px 16px">${road}</div>

    <div class="note rise">
      <strong style="font-family:var(--font-display)">How "learned" works:</strong>
      a word turns green once you have answered it correctly ${LEARN_TARGET} times across the study modes. Short daily sessions of 15\u201320 minutes work best \u2014 revisit each set a day or two later, then again the next week.
    </div>`;
}

/* ---- start ---- */
try{ window.__studentName = localStorage.getItem("sqa_student_name") || ""; }catch(e){}
render();
</script>
</body>
</html>
